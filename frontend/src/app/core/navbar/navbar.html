<header class="fixed top-0 w-full z-50 bg-surface/80 backdrop-blur-md border-b border-outline-variant/30">
  <div class="flex justify-between items-center w-full px-margin-desktop py-6 max-w-container-max mx-auto">

    <!-- Logo -->
    <div class="flex items-center gap-12">
      <a routerLink="/" class="font-display text-2xl tracking-tighter text-primary">
        AETHERIA
      </a>

      <!-- Navegación principal -->
      <nav class="hidden md:flex gap-8">
        <a
          routerLink="/perfumes"
          routerLinkActive="border-b border-primary font-bold"
          class="text-secondary hover:text-primary transition-colors duration-300 font-body text-label-caps uppercase tracking-widest"
        >
          Perfumes
        </a>
        <a
          routerLink="/decants"
          routerLinkActive="border-b border-primary font-bold"
          class="text-secondary hover:text-primary transition-colors duration-300 font-body text-label-caps uppercase tracking-widest"
        >
          Decants
        </a>
        <a
          routerLink="/contacto"
          routerLinkActive="border-b border-primary font-bold"
          class="text-secondary hover:text-primary transition-colors duration-300 font-body text-label-caps uppercase tracking-widest"
        >
          Contact Us
        </a>
      </nav>
    </div>

    <!-- Iconos derecha -->
    <div class="flex items-center gap-6">
      <span class="material-symbols-outlined cursor-pointer text-primary hover:opacity-70 transition-opacity">
        search
      </span>
      <span
      routerLink="/login"
        class="material-symbols-outlined cursor-pointer text-primary hover:opacity-70 transition-opacity"
      >
        person
      </span>
      <!-- Ícono carrito con badge -->
      <a routerLink="/cart" class="relative cursor-pointer hover:opacity-70 transition-opacity">
        <span class="material-symbols-outlined text-primary">shopping_bag</span>
        @if (cartService.itemCount() > 0) {
          <span class="absolute -top-2 -right-2 bg-primary text-on-primary text-[10px] font-bold rounded-full w-4 h-4 flex items-center justify-center">
            {{ cartService.itemCount() }}
          </span>
        }
</a>
    </div>

  </div>
</header>
