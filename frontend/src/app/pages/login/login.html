<!-- Fondo gris, sin navbar ni footer para pantalla de auth -->
<div class="min-h-screen bg-secondary-container flex items-center justify-center px-margin-mobile py-16">

  <div class="w-full max-w-md bg-surface-container-lowest p-12">

    <!-- Logo -->
    <div class="text-center mb-10">
      <h1 class="font-display text-3xl text-primary tracking-tighter mb-1">AETHERIA</h1>
      <p class="font-body text-label-caps text-secondary uppercase tracking-widest">
        Exquisite Fragrance
      </p>
    </div>

    <!-- Error -->
    @if (errorMsg()) {
      <div class="bg-red-50 border border-red-200 text-red-700 font-body text-label-caps px-4 py-3 mb-6 uppercase tracking-widest">
        {{ errorMsg() }}
      </div>
    }

    <!-- Formulario -->
    <div class="space-y-8">

      <!-- Email -->
      <div>
        <label class="font-body text-label-caps text-primary uppercase tracking-widest block mb-2">
          Email Address
        </label>
        <input
          type="email"
          placeholder="your@email.com"
          [value]="email()"
          (input)="email.set($any($event.target).value)"
          class="w-full border-b border-outline-variant bg-transparent py-3 font-body text-body-md text-primary placeholder-secondary focus:outline-none focus:border-primary transition-colors"
        />
      </div>

      <!-- Password -->
      <div>
        <div class="flex justify-between items-center mb-2">
          <label class="font-body text-label-caps text-primary uppercase tracking-widest">
            Password
          </label>
          <a
            routerLink="/forgot-password"
            class="font-body text-label-caps text-secondary hover:text-primary transition-colors uppercase tracking-widest"
          >
            Forgot password?
          </a>
        </div>
        <div class="relative">
          <input
            [type]="showPass() ? 'text' : 'password'"
            placeholder="••••••••"
            [value]="password()"
            (input)="password.set($any($event.target).value)"
            class="w-full border-b border-outline-variant bg-transparent py-3 font-body text-body-md text-primary placeholder-secondary focus:outline-none focus:border-primary transition-colors pr-10"
          />
          <button
            (click)="showPass.set(!showPass())"
            class="absolute right-0 top-3 text-secondary hover:text-primary transition-colors"
          >
            <span class="material-symbols-outlined text-[18px]">
              {{ showPass() ? 'visibility_off' : 'visibility' }}
            </span>
          </button>
        </div>
      </div>

      <!-- Submit -->
      <button
        (click)="onSubmit()"
        [disabled]="isLoading()"
        class="w-full py-5 bg-primary text-on-primary font-body text-label-caps uppercase tracking-widest hover:opacity-90 transition-opacity disabled:opacity-50 disabled:cursor-not-allowed flex items-center justify-center gap-3"
      >
        @if (isLoading()) {
          <span class="material-symbols-outlined animate-spin text-[18px]">progress_activity</span>
          Signing in...
        } @else {
          Sign In →
        }
      </button>

    </div>

    <!-- Divider -->
    <div class="flex items-center gap-4 my-8">
      <div class="flex-1 h-px bg-outline-variant"></div>
      <span class="font-body text-label-caps text-secondary uppercase tracking-widest">Or continue with</span>
      <div class="flex-1 h-px bg-outline-variant"></div>
    </div>

    <!-- Social buttons -->
    <div class="grid grid-cols-2 gap-4 mb-8">
      <button class="border border-outline-variant py-4 font-body text-label-caps uppercase tracking-widest text-secondary hover:border-primary hover:text-primary transition-all flex items-center justify-center gap-2">
        <span class="material-symbols-outlined text-[16px]">cloud</span>
        Google
      </button>
      <button class="border border-outline-variant py-4 font-body text-label-caps uppercase tracking-widest text-secondary hover:border-primary hover:text-primary transition-all flex items-center justify-center gap-2">
        <span class="material-symbols-outlined text-[16px]">phone_iphone</span>
        Apple
      </button>
    </div>

    <!-- Registro -->
    <p class="text-center font-body text-body-md text-secondary">
      Don't have an account?
      <a routerLink="/register" class="text-primary font-medium hover:opacity-70 transition-opacity ml-1">
        Create Account
      </a>
    </p>

  </div>
</div>
